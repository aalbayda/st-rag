# FastAPI, Streamlit, and Caddy.
# Secrets and DOMAIN come from .env.

services:
  backend:
    build: .
    image: ask-bob:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/app.db
    volumes:
      - sqlite_data:/data
    # init_db is idempotent.
    # Create the Pinecone index manually.
    command: >
      sh -c "/app/.venv/bin/python -m scripts.init_db &&
             exec /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # Liveness only.
    # /health checks external services.
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c",
             "import socket; socket.create_connection(('localhost',8000),3).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ask-bob:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      API_BASE_URL: http://backend:8000
    # Serve Streamlit under /rag.
    command: >
      /app/.venv/bin/streamlit run frontend/streamlit_app.py
      --server.port 8501 --server.address 0.0.0.0
      --server.headless true --browser.gatherUsageStats false
      --server.baseUrlPath rag

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
